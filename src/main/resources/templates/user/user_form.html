<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="darkhold create user page" />
        <meta name="author" content="Suraj" />
        <title th:text="#{user.title} + ' - Darkhold'">User Management - Darkhold</title>
        <link rel="manifest" href="/manifest.json">
        <link rel="shortcut icon" href="/images/favicon.png">
        <link href="/styles/darkhold-styles.css" rel="stylesheet" />
        <link href="/styles/admin-user-form.css" rel="stylesheet" />
        <script type="text/javascript" src="/scripts/theme-manager.js"></script>
        <script type="text/javascript" src="/scripts/audio-manager.js"></script>
        <script type="text/javascript" src="/scripts/language-manager.js"></script>
        <script type="text/javascript" src="/scripts/accessibility.js"></script>
        <script type="text/javascript" src="/scripts/common-scripts.js"></script>
        <script type="text/javascript" src="/scripts/user-management-scripts.js"></script>
        <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
    </head>
    <body class="admin-page">
        <div th:insert="~{navbar :: navbar}"></div>

        <!-- Admin Sidebar (same as user management) -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-header">
                <h2 class="admin-sidebar-title">
                    <i class="fas fa-shield-alt"></i>
                    <span th:text="#{admin.title}">Admin Panel</span>
                </h2>
            </div>
            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-label" th:text="#{admin.main}">Main</div>
                    <a href="/options" class="admin-nav-item">
                        <i class="fas fa-home"></i>
                        <span th:text="#{admin.dashboard}">Dashboard</span>
                    </a>
                </div>
                <div class="admin-nav-section">
                    <div class="admin-nav-section-label" th:text="#{admin.management}">Management</div>
                    <a href="/userManagement" class="admin-nav-item active">
                        <i class="fas fa-users"></i>
                        <span th:text="#{admin.users}">Users</span>
                    </a>
                    <a href="/options" class="admin-nav-item">
                        <i class="fas fa-clipboard-list"></i>
                        <span th:text="#{admin.challenges}">Challenges</span>
                    </a>
                    <a href="/activegames" class="admin-nav-item">
                        <i class="fas fa-gamepad"></i>
                        <span th:text="#{admin.activeGames}">Active Games</span>
                    </a>
                    <a href="/pastgames" class="admin-nav-item">
                        <i class="fas fa-history"></i>
                        <span th:text="#{admin.pastGames}">Past Games</span>
                    </a>
                </div>
                <div class="admin-nav-section">
                    <div class="admin-nav-section-label" th:text="#{admin.system}">System</div>
                    <a href="/options" class="admin-nav-item">
                        <i class="fas fa-cog"></i>
                        <span th:text="#{admin.settings}">Settings</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Admin Content -->
        <main class="admin-content">
            <!-- Page Header -->
            <div class="admin-content-header">
                <div class="admin-breadcrumb">
                    <a href="/options" th:text="#{admin.home}">Home</a>
                    <span class="admin-breadcrumb-separator">/</span>
                    <a href="/userManagement" th:text="#{user.manageUsers}">Users</a>
                    <span class="admin-breadcrumb-separator">/</span>
                    <span>[[${pageTitle}]]</span>
                </div>
                <h1 class="admin-page-title">[[${pageTitle}]]</h1>
            </div>
            <div class="admin-form-card">
                <form th:action="@{/users/save}" method="post" th:object="${userForm}"
                      enctype="multipart/form-data"
                      onsubmit="return checkEmailUnique(this);">
                    <input type="hidden" th:field="*{id}" />

                    <!-- First Name -->
                    <div class="admin-form-group">
                        <label class="admin-form-label">
                            <span th:text="#{user.firstName}">First Name</span>
                            <span class="required">*</span>
                        </label>
                        <input type="text" class="admin-form-input" th:field="*{firstName}"
                               required minlength="2" maxlength="90"
                               th:placeholder="#{user.firstNamePlaceholder}" placeholder="Enter first name" />
                    </div>

                    <!-- Last Name -->
                    <div class="admin-form-group">
                        <label class="admin-form-label">
                            <span th:text="#{user.lastName}">Last Name</span>
                            <span class="required">*</span>
                        </label>
                        <input type="text" class="admin-form-input" th:field="*{lastName}"
                               required minlength="2" maxlength="90"
                               th:placeholder="#{user.lastNamePlaceholder}" placeholder="Enter last name" />
                    </div>

                    <!-- Email -->
                    <div class="admin-form-group">
                        <label class="admin-form-label">
                            <span th:text="#{user.email}">Email</span>
                            <span class="required">*</span>
                        </label>
                        <input type="email" class="admin-form-input" th:field="*{email}"
                               required minlength="6" maxlength="128"
                               th:placeholder="#{user.emailPlaceholder}" placeholder="user@example.com" />
                    </div>

                    <!-- Password -->
                    <div class="admin-form-group">
                        <label class="admin-form-label">
                            <span th:text="#{user.password}">Password</span>
                            <span th:if="${userForm.id == null}" class="required">*</span>
                        </label>
                        <input type="password" class="admin-form-input" th:field="*{password}"
                               th:required="${userForm.id == null}"
                               minlength="8" maxlength="20"
                               th:placeholder="#{user.passwordPlaceholder}" placeholder="Enter password (min 8 characters)" />
                        <div class="admin-form-hint" th:if="${userForm.id != null}" th:text="#{user.passwordHint}">
                            Leave blank to keep current password
                        </div>
                    </div>

                    <!-- Roles -->
                    <div class="admin-form-group">
                        <label class="admin-form-label">
                            <span th:text="#{user.roles}">Roles</span>
                            <span class="required">*</span>
                        </label>
                        <div class="admin-roles-grid">
                            <th:block th:each="role : ${listRoles}">
                                <div class="admin-role-item">
                                    <input type="checkbox" class="admin-role-checkbox"
                                           th:field="*{roles}" th:value="${role.id}" th:id="'role_' + ${role.id}"/>
                                    <label class="admin-role-info" th:for="'role_' + ${role.id}">
                                        <span class="admin-role-name">[[${role.name}]]</span>
                                        <span class="admin-role-description">[[${role.description}]]</span>
                                    </label>
                                </div>
                            </th:block>
                        </div>
                    </div>

                    <!-- Enabled Toggle -->
                    <div class="admin-form-group">
                        <label class="admin-form-label" th:text="#{user.accountStatus}">Account Status</label>
                        <div class="admin-toggle-field">
                            <label class="admin-toggle-switch">
                                <input type="checkbox" th:field="*{enabled}" />
                                <span class="admin-toggle-slider"></span>
                            </label>
                            <span class="admin-toggle-label" th:text="#{user.accountEnabled}">Account Enabled</span>
                        </div>
                        <div class="admin-form-hint" th:text="#{user.enabledHint}">
                            Disabled accounts cannot login to the system
                        </div>
                    </div>

                    <!-- Photo Upload -->
                    <div class="admin-form-group">
                        <label class="admin-form-label" th:text="#{user.profilePhoto}">Profile Photo</label>
                        <div class="admin-photo-upload">
                            <div class="admin-photo-preview">
                                <img id="thumbnail" th:if="${userForm.photosImagePath != null}"
                                     th:src="@{${userForm.photosImagePath}}"
                                     th:alt="#{user.photosPreview}" alt="Profile photo" />
                                <div th:unless="${userForm.photosImagePath != null}" class="admin-photo-preview-placeholder">
                                    <i class="fas fa-user"></i>
                                </div>
                            </div>
                            <input type="hidden" th:field="*{photo}" />
                            <input type="file" id="fileImage" name="image" class="admin-file-input"
                                   accept="image/png, image/jpeg"
                                   onchange="changeThumbnail(this);" />
                            <div class="admin-form-hint" th:text="#{user.photoHint}">
                                Maximum file size: 1MB. Formats: PNG, JPEG
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="admin-form-actions">
                        <button type="button" class="btn btn-secondary" onclick="toUsers()">
                            <i class="fas fa-times"></i>
                            <span th:text="#{user.cancel}">Cancel</span>
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            <span th:text="#{user.save}">Save User</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <!-- Mobile Sidebar Toggle -->
        <button class="admin-sidebar-toggle" onclick="toggleAdminSidebar()">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Warning Modal -->
        <div class="modal fade" id="modalDialog" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle" th:text="#{user.warning}">Warning</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p id="modalBody"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal" th:text="#{user.close}">Close</button>
                    </div>
                </div>
            </div>
        </div>
        <script type="text/javascript">
            /*<![CDATA[*/
            // Mobile sidebar toggle
            function toggleAdminSidebar() {
                const sidebar = document.getElementById('adminSidebar');
                sidebar.classList.toggle('active');
            }

            function toUsers() {
                window.location = "/userManagement";
            }

            function checkEmailUnique(form) {
                const email = form.email.value;
                const userId = form.id.value;
                const xhr = new XMLHttpRequest();
                xhr.open("POST", "/users/check_email", true);
                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
                xhr.send("email=" + encodeURIComponent(email) + "&id=" + userId);
                xhr.onreadystatechange = function () {
                    if (this.readyState == 4 && this.status == 200) {
                        // The request has been processed successfully
                        const response = this.responseText;
                        if (response == 'OK') {
                            form.submit();
                        } else if (response == 'DUPLICATED') {
                            showModelDialog("Warning", "Email already exists. Please use a different email : " + email);
                        } else {
                            showModelDialog("Error", "An error occurred while checking email uniqueness. Please try again later.");
                        }
                    }
                }
                return false;
            }

            function showModelDialog(title, body) {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalBody').innerText = body;
                const myModal = new bootstrap.Modal(document.getElementById('modalDialog'));
                myModal.show();
            }

            function changeThumbnail(input) {
                console.log("thumbnail changed");
                console.log("File changed : " + input.files[0].name);
                const fileSize = input.files[0].size;
                console.log("File size : " + fileSize);
                if (fileSize > 1048576) {
                    input.setCustomValidity("Please select a file with a size less than 1 MB.");
                    input.reportValidity();
                } else {
                    input.setCustomValidity("");
                    showImageThumbnail(input);
                }
            }

            function showImageThumbnail(fileInput) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (function (f) {
                    return function (e) {
                        let thumb = document.getElementById("thumbnail");
                        thumb.setAttribute("src", e.target.result);
                    };
                })(file);
            }
            /*]]>*/
        </script>
    </body>
</html>
