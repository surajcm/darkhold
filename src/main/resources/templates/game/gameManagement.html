<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{gameManagement.title} + ' - Darkhold'">Game Management - Darkhold</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="/images/favicon.png">
    <link href="/styles/darkhold-styles.css" rel="stylesheet" />
    <script type="text/javascript" src="/scripts/theme-manager.js"></script>
    <script type="text/javascript" src="/scripts/audio-manager.js"></script>
    <script type="text/javascript" src="/scripts/language-manager.js"></script>
    <script type="text/javascript" src="/scripts/accessibility.js"></script>
    <script type="text/javascript" src="/scripts/common-scripts.js"></script>
</head>
<body class="bg-admin">
    <div th:insert="~{navbar :: navbar}"></div>
    <form action="#" method="post">
        <div class="container">
            <div class="body-style">
                <div style="width:45%;float:left;margin-left:50px;">
                    <h1 style="font-weight:bold;font-size:34px;" th:text="#{gameManagement.title}">Game Management</h1>
                    <div style="font-size:25px;text-align:left;" th:text="#{gameManagement.yetToImplement}">
                        Yet to implement
                    </div>
                    <div>
                        <br/>
                        <button class="button-style" onclick="toHome();" th:text="#{error.visitHomepage}">Visit Homepage</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <script type="text/javascript" src="/scripts/core/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="/scripts/core/popper.min.js"></script>
    <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
</body>
</html>
