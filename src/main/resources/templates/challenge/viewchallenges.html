<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title th:text="#{challenge.view.title}">View Challenges - Darkhold</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" href="/images/favicon.png">
    <link rel="stylesheet" href="/styles/darkhold-styles.css" />
    <link rel="stylesheet" href="/styles/view-challenges.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" >
    <script type="text/javascript" src="/scripts/theme-manager.js"></script>
    <script type="text/javascript" src="/scripts/audio-manager.js"></script>
    <script type="text/javascript" src="/scripts/language-manager.js"></script>
    <script type="text/javascript" src="/scripts/accessibility.js"></script>
    <script type="text/javascript" src="/scripts/view-challenges-scripts.js"></script>
    <script type="text/javascript" src="/scripts/common-scripts.js"></script>
</head>
<body>
    <div th:insert="~{navbar :: navbar}"></div>

    <main class="view-challenges-page">
        <div class="view-challenges-container">
            <form action="#" th:object="${challengeInfo}" method="post">
                <input type="hidden" th:name="challenges" id="challenges"/>

                <!-- Page Header -->
                <header class="view-challenges-header">
                    <h1 class="view-challenges-title" th:text="#{challenge.view.title}">My Challenges</h1>
                    <p class="view-challenges-subtitle">Browse, edit, and manage your quiz collection</p>
                </header>

                <!-- Search Section -->
                <section class="search-section">
                    <div class="search-form">
                        <input type="text" class="search-input"
                               th:placeholder="#{challenge.view.searchPlaceholder}"
                               placeholder="Search challenges by name or topic..." />
                        <button type="button" class="search-btn" th:text="#{challenge.view.search}">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </section>

                <!-- Challenges Section -->
                <section>
                    <div class="challenges-section-header">
                        <h2 class="challenges-section-title" th:text="#{challenge.view.recentChallenges}">Recent Challenges</h2>
                        <span class="challenges-count" th:if="${challengeInfo.challengeSummaryList != null}"
                              th:text="${#lists.size(challengeInfo.challengeSummaryList)} + ' challenges'">5 challenges</span>
                    </div>

                    <!-- Challenges Grid -->
                    <div class="challenges-grid" th:if="${challengeInfo.challengeSummaryList != null and !#lists.isEmpty(challengeInfo.challengeSummaryList)}">
                        <div th:each="ch: ${challengeInfo.challengeSummaryList}"
                             th:id="${ch.challengeId}"
                             class="challenge-card">
                            <div class="challenge-card-header" onclick="selectQuiz(this);">
                                <div class="challenge-id-badge">
                                    <span th:text="'#' + ${ch.challengeId}">#1</span>
                                </div>
                                <h3 class="challenge-card-title" th:text="${ch.challengeName}">Sample Challenge</h3>
                            </div>

                            <div class="challenge-card-actions">
                                <a class="challenge-action-btn challenge-action-btn--edit"
                                   th:href="@{'/edit_challenge/' + ${ch.challengeId}}"
                                   th:title="#{challenge.view.edit}"
                                   title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button type="button"
                                        class="challenge-action-btn challenge-action-btn--duplicate"
                                        onclick="duplicateChallenge(this);"
                                        th:title="#{challenge.view.duplicate}"
                                        title="Duplicate">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <button type="button"
                                        class="challenge-action-btn challenge-action-btn--delete"
                                        data-bs-toggle="modal"
                                        data-bs-target="#confirmModal"
                                        onclick="markQuizForDeletion(this);"
                                        title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div class="empty-state" th:if="${challengeInfo.challengeSummaryList == null or #lists.isEmpty(challengeInfo.challengeSummaryList)}">
                        <div class="empty-state-icon">
                            <i class="fas fa-clipboard-list"></i>
                        </div>
                        <h3 class="empty-state-title">No Challenges Yet</h3>
                        <p class="empty-state-text">Create your first challenge to get started</p>
                        <a href="/create_challenge" class="btn-primary-create">
                            <i class="fas fa-plus-circle"></i>
                            <span>Create Challenge</span>
                        </a>
                    </div>
                </section>

                <!-- Delete Confirmation Modal -->
                <div id="confirmModal" class="modal fade" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="confirmModalLabel" th:text="#{challenge.view.confirmDelete}">Are you sure?</h5>
                                <button type="button" id="closeConfirmModal" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <p th:text="#{challenge.view.deleteWarning}">Do you really want to delete this challenge? This process cannot be undone.</p>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" th:text="#{button.cancel}">Cancel</button>
                                <button type="button" class="btn btn-danger" onclick="deleteQuiz();" th:text="#{challenge.view.delete}">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script type="text/javascript" src="/scripts/core/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="/scripts/core/popper.min.js"></script>
    <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
</body>
</html>
