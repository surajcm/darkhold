<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title th:text="#{options.title} + ' - Darkhold'">Settings - Darkhold</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" href="/images/favicon.png">
    <link rel="stylesheet" href="/styles/darkhold-styles.css" />
    <script type="text/javascript" src="/scripts/theme-manager.js"></script>
    <script type="text/javascript" src="/scripts/language-manager.js"></script>
    <script type="text/javascript" src="/scripts/common-scripts.js"></script>
    <script type="text/javascript" src="/scripts/audio-manager.js"></script>
    <script type="text/javascript" src="/scripts/accessibility.js"></script>
    <script type="text/javascript" src="/scripts/options-scripts.js"></script>
</head>
<body class="bg-admin">
    <div th:insert="~{navbar :: navbar}"></div>
    <form action="#" method="post">
        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
        <div class="container mt-5">
            <div class="row">
                <div class="col-lg-3 col-md-6 col-xs-12 pl-1 pr-1">
                    <div class="card" style="cursor:pointer" onclick="createChallenge();">
                        <h3 th:text="#{options.createChallenge}">Create Challenge</h3>
                        <p th:text="#{options.createChallengeDesc}">With or without Excel</p>
                    </div>
                </div>
                <div class="col-lg-4 col-md-8 col-xs-12 pl-1 pr-1">
                    <div class="card" style="cursor:pointer" onclick="viewChallenge();">
                        <h3 th:text="#{options.viewChallenge}">View existing Challenge</h3>
                        <p>  </p>
                    </div>
                </div>
                <div class="col-lg-4 col-md-8 col-xs-12 pl-1 pr-1">
                    <div class="card" style="cursor:pointer" onclick="activeChallenge();">
                        <h3 th:utext="#{options.viewActiveChallenge}">View active <br/>Challenge</h3>
                        <p>  </p>
                    </div>
                </div>
            </div>
        </div>
        <hr class="mt-2 mb-3"/>
        <div class="container mt-5">
            <div class="row">
                <div class="col-lg-6 col-md-8 col-xs-12 pl-1 pr-1">
                    <div class="card" style="cursor:pointer" onclick="manageUsers();">
                        <h3 th:text="#{options.userManagement}">User Management</h3>
                        <p> </p>
                    </div>
                </div>
                <div class="col-lg-6 col-md-8 col-xs-12 pl-1 pr-1">
                    <div class="card" style="cursor:pointer" onclick="manageGame();">
                        <h3 th:text="#{options.gameManagement}">Game Management</h3>
                        <p>  </p>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <script type="text/javascript" src="/scripts/core/popper.min.js"></script>
    <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
</body>
</html>
