<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Page not found" />
    <title>Error - Darkhold</title>
    <link rel="shortcut icon" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <link href="/styles/darkhold-styles.css" rel="stylesheet" />
    <link href="/styles/error.css" rel="stylesheet" />
    <script type="text/javascript" src="/scripts/theme-manager.js"></script>
    <script type="text/javascript" src="/scripts/audio-manager.js"></script>
    <script type="text/javascript" src="/scripts/language-manager.js"></script>
    <script type="text/javascript" src="/scripts/accessibility.js"></script>
    <script type="text/javascript" src="/scripts/common-scripts.js"></script>
</head>
<body class="error-page">
    <div th:insert="~{navbar :: navbar}"></div>

    <div class="error-container">
        <div class="error-content">
            <img src="/images/404.png" alt="404 Error" class="error-illustration" />
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">
                We can't find the page you're looking for. You can either return to the previous page, visit our homepage, or contact our support team.
            </p>
            <div class="error-actions">
                <a href="javascript:history.back()" class="error-btn error-btn--secondary">
                    <i class="fas fa-arrow-left"></i>
                    <span>Go Back</span>
                </a>
                <a href="/" class="error-btn error-btn--primary">
                    <i class="fas fa-home"></i>
                    <span>Visit Homepage</span>
                </a>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
</body>
</html>
