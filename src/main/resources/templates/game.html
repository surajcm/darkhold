<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Playing Quiz - Darkhold</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#0062cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Darkhold Quiz">
    <link rel="shortcut icon" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/icons/icon-192.png">
    <link rel="stylesheet" href="/styles/darkhold-styles.css" />
    <link rel="stylesheet" href="/styles/game-play.css" />
    <link rel="stylesheet" href="/styles/core/flipclock.css" />
    <script type="text/javascript" src="/scripts/theme-manager.js"></script>
    <script type="text/javascript" src="/scripts/audio-manager.js"></script>
    <script type="text/javascript" src="/scripts/language-manager.js"></script>
    <script type="text/javascript" src="/scripts/accessibility.js"></script>
    <script type="text/javascript" src="/scripts/common-scripts.js"></script>
</head>
<body class="game-play-page" onload="connect()">
    <div th:insert="~{navbar :: navbar}"></div>

    <!-- Game Header -->
    <header class="game-header">
        <div class="game-header-content">
            <!-- Timer Section -->
            <div class="game-timer-section">
                <div class="clock2"></div>
                <div class="message"></div>
            </div>

            <!-- Question Info -->
            <div class="game-question-info">
                <div class="question-number-badge">
                    <i class="fas fa-question-circle"></i>
                    <span th:text="#{game.question} + ' ' + ${challenge.questionNumber} + ' / ' + ${challenge.totalQuestions}">Question 1 of 10</span>
                </div>
                <h2 class="question-text-header" th:text="${challenge.QuestionSet.question}">What is the capital of France?</h2>
            </div>

            <!-- Game Controls (Moderator only) -->
            <div class="game-controls" th:if="${not #sets.isEmpty(#authentication.getPrincipal().getAuthorities())}">
                <button id="pauseButton" class="game-control-btn game-control-btn--pause" type="button" onclick="togglePause()">
                    <i class="fas fa-pause"></i>
                    <span th:text="#{game.pause}">Pause</span>
                </button>
                <button id="nextButton" class="game-control-btn game-control-btn--next" type="button" style="display:none" onclick="showScoreboard()">
                    <i class="fas fa-arrow-right"></i>
                    <span th:text="#{game.next}">Next</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="pause-overlay" style="display:none;">
        <div class="pause-content">
            <h1 th:text="#{game.paused}">PAUSED</h1>
            <p th:text="#{game.pausedMessage}">The game has been paused by the moderator</p>
            <span th:if="${not #sets.isEmpty(#authentication.getPrincipal().getAuthorities())}">
                <button class="pause-resume-btn" onclick="togglePause()">
                    <i class="fas fa-play"></i>
                    <span th:text="#{game.resume}">Resume</span>
                </button>
            </span>
        </div>
    </div>

    <form action="#" th:object="${challenge}" method="post">
        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
        <input type="hidden" th:value="${quizPin}" id="quizPin" name="quizPin"/>
        <input type="hidden" th:value="${challenge.QuestionSet.correctOptions}" id="correctOptions"/>
        <input type="hidden" th:value="${game_timer}" id="time_to_flip"/>
        <input type="hidden" th:name="selectedOptions" id="selectedOptions"/>
        <input type="hidden" th:name="selectedAnswer" id="selectedAnswer"/>
        <input type="hidden" th:value="${#authentication.getPrincipal().getUsername()}" id="user"/>
        <input type="hidden" th:value="${#authentication.getPrincipal().getAuthorities()}" id="roles"/>
        <input type="hidden" th:value="${question_type}" id="questionType"/>
        <input type="hidden" th:value="${question_points}" id="questionPoints"/>
        <input type="hidden" th:value="${gameMode}" id="gameMode"/>

        <div class="game-content">

            <!-- Question Media -->
            <div th:if="${challenge.QuestionSet.imageUrl != null or challenge.QuestionSet.videoUrl != null}" class="question-media-section">
                <!-- Question Image -->
                <div th:if="${challenge.QuestionSet.imageUrl != null}" class="question-image-container">
                    <img th:src="${challenge.QuestionSet.imageUrl}"
                         alt="Question Image"
                         class="question-image">
                </div>
                <!-- Question Video -->
                <div th:if="${challenge.QuestionSet.videoUrl != null}" class="question-video-container">
                    <div class="ratio ratio-16x9">
                        <iframe th:src="${#strings.replace(challenge.QuestionSet.videoUrl, 'watch?v=', 'embed/')}"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <!-- Answer Space -->
            <div id="answerSpace" role="main">

                <!-- MULTIPLE_CHOICE and POLL: Answer Options -->
                <div th:if="${question_type == 'MULTIPLE_CHOICE' or question_type == 'POLL'}" class="answer-grid">
                    <div id="optionA" class="answer-option-card"
                         role="button" tabindex="0"
                         th:attr="aria-label='Answer option A: ' + ${challenge.QuestionSet.answer1}"
                         onclick="waitAndShowAnswer(this)">
                        <div class="answer-card-inner">
                            <h4 th:text="${challenge.QuestionSet.answer1}">Paris</h4>
                        </div>
                    </div>
                    <div id="optionB" class="answer-option-card"
                         role="button" tabindex="0"
                         th:attr="aria-label='Answer option B: ' + ${challenge.QuestionSet.answer2}"
                         onclick="waitAndShowAnswer(this)">
                        <div class="answer-card-inner">
                            <h4 th:text="${challenge.QuestionSet.answer2}">London</h4>
                        </div>
                    </div>
                    <div id="optionC" th:if="${not #strings.isEmpty(challenge.QuestionSet.answer3)}"
                         class="answer-option-card"
                         role="button" tabindex="0"
                         th:attr="aria-label='Answer option C: ' + ${challenge.QuestionSet.answer3}"
                         onclick="waitAndShowAnswer(this)">
                        <div class="answer-card-inner">
                            <h4 th:text="${challenge.QuestionSet.answer3}">Berlin</h4>
                        </div>
                    </div>
                    <div id="optionD" th:if="${not #strings.isEmpty(challenge.QuestionSet.answer4)}"
                         class="answer-option-card"
                         role="button" tabindex="0"
                         th:attr="aria-label='Answer option D: ' + ${challenge.QuestionSet.answer4}"
                         onclick="waitAndShowAnswer(this)">
                        <div class="answer-card-inner">
                            <h4 th:text="${challenge.QuestionSet.answer4}">Madrid</h4>
                        </div>
                    </div>
                </div>

                <!-- TRUE_FALSE: True/False Options -->
                <div th:if="${question_type == 'TRUE_FALSE'}" class="answer-grid">
                    <div id="optionTRUE" class="answer-option-card"
                         role="button" tabindex="0" aria-label="Answer: True"
                         onclick="waitAndShowTrueFalse(this)">
                        <div class="answer-card-inner answer-card-inner--true">
                            <h2 th:text="#{game.true}">TRUE</h2>
                        </div>
                    </div>
                    <div id="optionFALSE" class="answer-option-card"
                         role="button" tabindex="0" aria-label="Answer: False"
                         onclick="waitAndShowTrueFalse(this)">
                        <div class="answer-card-inner answer-card-inner--false">
                            <h2 th:text="#{game.false}">FALSE</h2>
                        </div>
                    </div>
                </div>

                <!-- TYPE_ANSWER: Text Input -->
                <div th:if="${question_type == 'TYPE_ANSWER'}" class="type-answer-container">
                    <div class="type-answer-card">
                        <label for="typeAnswerInput" class="type-answer-label" th:text="#{game.typeYourAnswer}">Type your answer:</label>
                        <input type="text" id="typeAnswerInput" class="type-answer-input"
                               th:placeholder="#{game.enterAnswerPlaceholder}"
                               placeholder="Enter your answer here..."
                               maxlength="225" autocomplete="off"
                               aria-label="Type your answer"/>
                        <button type="button" class="type-answer-submit" onclick="submitTypeAnswer()">
                            <i class="fas fa-check"></i>
                            <span th:text="#{game.submitAnswer}">Submit Answer</span>
                        </button>
                    </div>
                </div>

            </div>

            <!-- Waiting for Others Message -->
            <div id="waitingMessage" style="display:none;">
                <div class="waiting-message-container">
                    <div class="waiting-icon">
                        <i class="fas fa-check"></i>
                    </div>
                    <h3 class="waiting-title" th:text="#{game.answerSubmitted}">Answer Submitted!</h3>
                    <p class="waiting-text" th:text="#{game.waitingForOthers}">Waiting for other players to finish...</p>
                    <div class="progress-indicator">
                        <div class="progress-dot"></div>
                        <div class="progress-dot"></div>
                        <div class="progress-dot"></div>
                    </div>
                </div>
            </div>

            <!-- Practice Mode: Next Question Button -->
            <div id="practiceNextContainer" style="display:none;">
                <div class="text-center">
                    <button type="button" class="game-control-btn game-control-btn--next" style="display:inline-flex;" onclick="goToNextQuestion()">
                        <i class="fas fa-arrow-right"></i>
                        <span th:text="#{game.nextQuestion}">Next Question</span>
                    </button>
                </div>
            </div>

        </div>
    </form>

    <script type="text/javascript" src="/scripts/core/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="/scripts/core/popper.min.js"></script>
    <script type="text/javascript" src="/scripts/core/bootstrap-5.3.1/bootstrap.min.js"></script>
    <script type="text/javascript" src="/scripts/core/flipclock.js"></script>
    <script type="text/javascript" src="/scripts/game-scripts.js"></script>
    <script type="text/javascript" src="/scripts/core/sockjs.min.js"></script>
    <script type="text/javascript" src="/scripts/core/stomp.min.js"></script>
</body>
</html>
